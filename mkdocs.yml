site_name: FastAPI RBAC Engine
site_description: Production-grade Role-Based Access Control for FastAPI
site_author: Munya junior (khalid) at Kwantabit Technologies
site_url: https://fastapi-rbac.readthedocs.io

repo_name: kwantabit/fastapi-rbac
repo_url: https://github.com/KwantaBit-Technologies/fastapi-rbac
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            docstring_style: google
  - include-markdown

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Guides:
    - Caching: caching.md
    - Multi-tenancy: multi-tenancy.md
    - Integration: integration.md
    - Deployment: deployment.md
  - Contributing: contributing.md
  - Changelog: changelog.md
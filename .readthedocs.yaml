# .readthedocs.yaml
# Production-ready configuration for FastAPI RBAC Enterprise documentation
# Comprehensive Role-Based Access Control system for FastAPI applications

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"
  jobs:
    pre_checkout:
      - command: "echo 'Starting documentation build for FastAPI RBAC'"

    post_checkout:
      - command: "git fetch --unshallow || true"

    pre_install:
      - command: "pip install --upgrade pip"
      - command: "pip install uv"

    install:
      - command: "uv pip install --system -e '.[docs]'"
      - command: "uv pip install --system mkdocs-material-extensions pillow cairosvg pymdown-extensions"

    post_install:
      - command: "python --version"
      - command: "pip list | grep -E 'mkdocs|pymdown|mkdocstrings'"

    pre_build:
      - command: "mkdir -p $READTHEDOCS_OUTPUT/html"
      - command: "echo 'Building documentation with MkDocs'"
      - command: "mkdocs build --clean --verbose --site-dir $READTHEDOCS_OUTPUT/html"

    post_build:
      - command: "echo 'Documentation built successfully'"
      - command: "ls -la $READTHEDOCS_OUTPUT/html"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

pull_requests:
  enabled: true